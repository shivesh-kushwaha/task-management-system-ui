<div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mt-2">
    <div class="d-flex align-items-center gap-2 text-muted small">
        <span>Showing {{ startRecord }}–{{ endRecord }} of {{ totalCount }}</span>
        <select class="form-select form-select-sm w-auto" [(ngModel)]="pageSize" (change)="onPageSizeChange($event)">
            @for (size of pageSizeOptions; track size) {
            <option [value]="size">{{ size }} / page</option>
            }
        </select>
    </div>

    <nav>
        <ul class="pagination pagination-sm mb-0">
            <li class="page-item" [class.disabled]="pageIndex === 0">
                <button class="page-link" (click)="goToPage(pageIndex - 1)">
                    <i class="bi bi-chevron-left"></i>
                </button>
            </li>
            @for (page of pageNumbers; track page) {
            <li class="page-item" [class.active]="page === pageIndex">
                <button class="page-link" (click)="goToPage(page)">{{ page + 1 }}</button>
            </li>
            }
            <li class="page-item" [class.disabled]="pageIndex >= totalPages - 1">
                <button class="page-link" (click)="goToPage(pageIndex + 1)">
                    <i class="bi bi-chevron-right"></i>
                </button>
            </li>
        </ul>
    </nav>
</div>
