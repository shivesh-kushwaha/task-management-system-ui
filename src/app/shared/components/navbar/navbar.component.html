<nav class="navbar bg-white border-bottom px-3 py-2 d-flex justify-content-between align-items-center">

  <!-- Welcome Message -->
  <div class="navbar__welcome">
    Welcome, {{ userName }}!
  </div>

  <!-- User Menu -->
  <div class="navbar__user position-relative">

    <!-- Avatar + Chevron trigger -->
    <div class="d-flex align-items-center gap-2 navbar__trigger" (click)="toggleDropdown()">
      <div class="navbar__avatar rounded-circle bg-primary text-white d-flex align-items-center justify-content-center">
        <i class="bi bi-person-fill"></i>
      </div>
      <i class="bi bi-chevron-down small text-muted"></i>
    </div>

    <!-- Dropdown -->
    @if (isDropdownOpen) {
      <div class="navbar__dropdown position-absolute end-0 mt-2 bg-white border rounded shadow-sm">
        <button class="btn btn-link text-danger text-decoration-none w-100 text-start px-3 py-2 small"
                (click)="logout()">
          <i class="bi bi-box-arrow-right me-2"></i>Logout
        </button>
      </div>
    }

  </div>
</nav>
