<nav class="navbar bg-white border-bottom p-2 d-flex justify-content-between align-items-center">
    <div>
        Welcome, {{userName}}!
    </div>
    <div class="position-relative">

        <!-- User Icon -->
        <div class="d-flex align-items-center gap-2" (click)="toggleDropdown()" style="cursor: pointer;">
            <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center"
                style="width: 36px; height: 36px;">
                <i class="bi bi-person-fill"></i>
            </div>
            <i class="bi bi-chevron-down small text-muted"></i>
        </div>

        <!-- Dropdown -->
        @if (isDropdownOpen) {
        <div class="position-absolute end-0 mt-2 bg-white border rounded shadow-sm"
            style="min-width: 160px; z-index: 1000;">
            <button class="btn btn-link text-danger text-decoration-none w-100 text-start px-3 py-2 small"
                (click)="logout()">
                <i class="bi bi-box-arrow-right me-2"></i>Logout
            </button>
        </div>
        }

    </div>
</nav>
