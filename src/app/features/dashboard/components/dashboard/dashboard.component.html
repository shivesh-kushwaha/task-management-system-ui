<div class="p-2">

    <!-- Header -->
    <div class="mb-4">
        <h5 class="fw-bold">Dashboard</h5>
    </div>

    <!-- Stats Cards -->
    <div class="row g-3">

        <!-- Total Projects -->
        <div class="col-12 col-sm-6 col-xl-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded p-3 bg-primary bg-opacity-10">
                        <i class="bi bi-folder fs-4 text-primary"></i>
                    </div>
                    <div>
                        <p class="text-muted small mb-0">Total Projects</p>
                        <h5 class="fw-bold mb-0">0</h5>
                    </div>
                </div>
            </div>
        </div>

        <!-- Total Work Items -->
        <div class="col-12 col-sm-6 col-xl-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded p-3 bg-success bg-opacity-10">
                        <i class="bi bi-list-task fs-4 text-success"></i>
                    </div>
                    <div>
                        <p class="text-muted small mb-0">Total Work Items</p>
                        <h5 class="fw-bold mb-0">0</h5>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pending Tasks -->
        <div class="col-12 col-sm-6 col-xl-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded p-3 bg-warning bg-opacity-10">
                        <i class="bi bi-clock fs-4 text-warning"></i>
                    </div>
                    <div>
                        <p class="text-muted small mb-0">Pending Tasks</p>
                        <h5 class="fw-bold mb-0">0</h5>
                    </div>
                </div>
            </div>
        </div>

        <!-- Total Users -->
        <div class="col-12 col-sm-6 col-xl-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded p-3 bg-info bg-opacity-10">
                        <i class="bi bi-people fs-4 text-info"></i>
                    </div>
                    <div>
                        <p class="text-muted small mb-0">Total Users</p>
                        <h5 class="fw-bold mb-0">0</h5>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Recent Work Items -->
    <div class="card border-0 shadow-sm mt-4">
        <div class="card-body">
            <h6 class="fw-bold mb-3">Recent Work Items</h6>
            <p class="text-muted small">No work items found.</p>
        </div>
    </div>

</div>
